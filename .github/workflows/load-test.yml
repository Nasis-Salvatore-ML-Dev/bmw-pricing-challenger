name: Load Test

on:
  push:
    branches: [staging]

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install locust
          pip install -r requirements.txt

      - name: Start API (background)
        run: |
          uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
          sleep 5  # give it time to start

      - name: Run Locust test
        run: |
          locust -f tests/load/locustfile.py --headless -u 10 -r 2 --run-time 30s --host http://localhost:8000 --csv=loadtest --html=report.html

      - name: Check for high error rate
        run: |
          # Extract error rate from CSV and fail if > 1%
          if grep -q "fail" loadtest_stats.csv; then
            echo "Errors detected"
            exit 1
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: report.html
