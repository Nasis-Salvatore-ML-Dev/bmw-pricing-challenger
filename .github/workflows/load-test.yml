name: Load Test

on:
  push:
    branches: [staging]
  # Optional: allow manual trigger
  workflow_dispatch:

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install locust
          pip install -r requirements.txt   # only needed if locustfile imports from src

      - name: Run Locust test
        run: |
          # Use the Cloud Run URL as the host
          locust -f tests/load/locustfile.py \
            --host https://bmw-pricing-api-<your-project>-ew.a.run.app \
            --headless -u 10 -r 2 --run-time 30s \
            --html=report.html --csv=loadtest

      - name: Check for errors
        run: |
          # Extract failure percentage from CSV and fail if > 1%
          if grep -q "fail" loadtest_stats.csv; then
            echo "Errors detected in load test" && exit 1
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: report.html
