name: Load Test

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install locust
          pip install -r requirements.txt

      - name: Run Locust test
        run: |
          # Replace this URL with your actual Cloud Run service URL
          locust -f tests/load/locustfile.py \
            --host https://bmw-pricing-api-759460685203.europe-west1.run.app \
            --headless -u 10 -r 2 --run-time 30s \
            --html=report.html --csv=loadtest

      - name: Check for errors
        run: |
          # Simple check: if any failure in stats, exit 1
          if grep -q "fail" loadtest_stats.csv; then
            echo "❌ Load test failures detected"
            exit 1
          fi

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: report.html
