name: Build and Deploy to Cloud Run

on:
  push:
    branches: ["main", "staging"]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: europe-west1
  SERVICE: bmw-pricing-api
  REGION: europe-west1
  SERVICE_ACCOUNT: bmw-pricing-api@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WIF_PROVIDER }}

jobs:
  # ── Job 1: Model quality gate ─────────────────────────────────────────────
  # Runs FIRST. If this fails, the deploy job never starts.
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model evaluation gate
        run: |
          python scripts/evaluate_model.py \
            --model-path models/random_forest.pkl \
            --data-path data/golden/golden_eval.csv \
            --thresholds-path config/evaluation/thresholds.json

  # ── Job 2: Build and deploy ───────────────────────────────────────────────
  # Only runs if Job 1 passes — enforced by "needs: evaluate"
  deploy:
    runs-on: ubuntu-latest
    needs: evaluate
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Google Auth (keyless via Workload Identity Federation)
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Docker Auth
        run: |-
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/bmw-repo/${{ env.SERVICE }}:${{ github.sha }}" .
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/bmw-repo/${{ env.SERVICE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/bmw-repo/${{ env.SERVICE }}:${{ github.sha }}
          flags: "--allow-unauthenticated --memory=1Gi --cpu=1 --no-cpu-throttling --min-instances=1 --concurrency=20"

      - name: Verify deployment health
        run: |
          sleep 10
          curl --fail ${{ steps.deploy.outputs.url }}/health || exit 1

      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
