steps:
  # Step 1: Install dependencies
  - id: "install"
    name: "python:3.10-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .

  # Step 2: Run linting
  - id: "lint"
    name: "python:3.10-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        make lint

  # Step 3: Run tests
  - id: "test"
    name: "python:3.10-slim"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        make test

  # Step 4: (Optional) Upload coverage report to Cloud Storage
  - id: "upload"
    name: "gcr.io/cloud-builders/gsutil"
    args:
      - "cp"
      - "htmlcov/index.html"
      - "gs://bmw-pricing-bucket/coverage/$(date -u +%Y%m%d-%H%M%S)/"
    waitFor: ["test"]

options:
  logging: CLOUD_LOGGING_ONLY
